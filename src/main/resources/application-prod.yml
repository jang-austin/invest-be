# Render / Supabase 등 운영 배포 시: SPRING_PROFILES_ACTIVE=prod
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

logging:
  level:
    root: INFO
    com.invest: INFO
