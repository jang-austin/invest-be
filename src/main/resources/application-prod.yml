spring:
  flyway:
    enabled: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        boot:
          allow_jdbc_metadata_access: false

logging:
  level:
    root: INFO
    com.invest: INFO
